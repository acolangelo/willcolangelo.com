<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Will’s Game Studio</title>
    <style>
      :root {
        color-scheme: dark;
        --page: #101418;
        --page-soft: #182129;
        --paper: #f5efe0;
        --ink: #14181d;
        --muted: #b7c1c8;
        --plastic: #c9c5b7;
        --plastic-dark: #7d786b;
        --plastic-light: #eee8d9;
        --slot: #262922;
        --edge: rgba(0, 0, 0, 0.44);
      }

      * {
        box-sizing: border-box;
      }

      html {
        min-width: 320px;
        min-height: 100%;
        background: var(--page);
      }

      body {
        min-height: 100dvh;
        margin: 0;
        color: var(--paper);
        background:
          linear-gradient(90deg, rgba(255, 255, 255, 0.035) 1px, transparent 1px) 0 0 / 34px 34px,
          linear-gradient(0deg, rgba(255, 255, 255, 0.025) 1px, transparent 1px) 0 0 / 34px 34px,
          radial-gradient(circle at 16% 10%, rgba(255, 214, 107, 0.14), transparent 28rem),
          radial-gradient(circle at 88% 18%, rgba(49, 198, 180, 0.12), transparent 24rem),
          linear-gradient(145deg, #101418 0%, #182129 48%, #101418 100%);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
      }

      a {
        color: inherit;
      }

      .studio {
        width: min(1160px, calc(100% - 32px));
        margin: 0 auto;
        padding: clamp(34px, 7vw, 86px) 0 48px;
      }

      .masthead {
        display: grid;
        gap: 12px;
        margin-bottom: clamp(28px, 5vw, 56px);
      }

      .eyebrow {
        margin: 0;
        color: var(--muted);
        font-size: 0.78rem;
        font-weight: 900;
        letter-spacing: 0.16em;
        text-transform: uppercase;
      }

      h1 {
        max-width: 10ch;
        margin: 0;
        font-size: clamp(3.1rem, 10vw, 7.5rem);
        line-height: 0.88;
        letter-spacing: 0;
      }

      .game-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: clamp(18px, 3vw, 32px);
        align-items: start;
      }

      .cartridge {
        position: relative;
        display: block;
        min-height: 430px;
        border: 1px solid rgba(255, 255, 255, 0.22);
        border-radius: 8px 8px 6px 6px;
        padding: 22px 20px 26px;
        overflow: hidden;
        isolation: isolate;
        color: var(--ink);
        text-decoration: none;
        background:
          linear-gradient(90deg, rgba(255, 255, 255, 0.28), transparent 14% 86%, rgba(0, 0, 0, 0.18)),
          linear-gradient(180deg, var(--plastic-light), var(--plastic) 40%, #a9a394);
        box-shadow:
          inset 0 2px 0 rgba(255, 255, 255, 0.78),
          inset 0 -10px 0 rgba(0, 0, 0, 0.12),
          0 24px 42px rgba(0, 0, 0, 0.36);
        transition:
          transform 180ms ease,
          box-shadow 180ms ease,
          filter 180ms ease;
      }

      .cartridge::before {
        content: "";
        position: absolute;
        inset: 0;
        z-index: -1;
        background:
          linear-gradient(180deg, transparent 0 72%, rgba(0, 0, 0, 0.1) 72%),
          repeating-linear-gradient(90deg, transparent 0 18px, rgba(0, 0, 0, 0.05) 18px 20px);
        pointer-events: none;
      }

      .cartridge::after {
        content: "";
        position: absolute;
        left: 18%;
        right: 18%;
        bottom: 0;
        height: 22px;
        border-radius: 7px 7px 0 0;
        background:
          repeating-linear-gradient(90deg, #d5a33a 0 10px, #7b5f25 10px 12px),
          #c7922d;
        box-shadow: 0 -4px 0 rgba(0, 0, 0, 0.18);
      }

      .cartridge:hover {
        transform: translateY(-8px);
        box-shadow:
          inset 0 2px 0 rgba(255, 255, 255, 0.78),
          inset 0 -10px 0 rgba(0, 0, 0, 0.12),
          0 34px 54px rgba(0, 0, 0, 0.44);
      }

      .cartridge:focus-visible {
        outline: 4px solid #ffd66b;
        outline-offset: 6px;
      }

      .notch {
        position: absolute;
        top: 10px;
        left: 50%;
        width: 92px;
        height: 14px;
        transform: translateX(-50%);
        border-radius: 0 0 8px 8px;
        background: rgba(92, 88, 80, 0.42);
        box-shadow: inset 0 3px 4px rgba(0, 0, 0, 0.28);
      }

      .screw {
        position: absolute;
        top: 28px;
        width: 18px;
        height: 18px;
        border-radius: 50%;
        background:
          linear-gradient(90deg, transparent 42%, rgba(0, 0, 0, 0.28) 42% 58%, transparent 58%),
          linear-gradient(#d8d1c0, #8d8677);
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.7),
          inset 0 -2px 2px rgba(0, 0, 0, 0.32);
      }

      .screw.left {
        left: 22px;
      }

      .screw.right {
        right: 22px;
      }

      .label {
        display: grid;
        grid-template-rows: minmax(0, 1fr) auto;
        min-height: 318px;
        margin-top: 34px;
        overflow: hidden;
        border: 3px solid #171a1f;
        border-radius: 6px;
        background: #111820;
        box-shadow:
          inset 0 0 0 3px rgba(255, 255, 255, 0.08),
          0 9px 0 rgba(0, 0, 0, 0.16);
      }

      .cover {
        position: relative;
        min-height: 236px;
        overflow: hidden;
      }

      .cover svg {
        display: block;
        width: 100%;
        height: 100%;
        min-height: 236px;
      }

      .title-strip {
        display: grid;
        gap: 11px;
        min-height: 88px;
        padding: 15px 18px 16px 22px;
        color: #f7f3e7;
        background:
          linear-gradient(90deg, rgba(255, 255, 255, 0.07), transparent 32%),
          #151a20;
      }

      .game-title {
        margin: 0;
        font-size: clamp(1.35rem, 2.5vw, 2rem);
        line-height: 0.95;
        letter-spacing: 0;
      }

      .game-meta {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        color: rgba(247, 243, 231, 0.72);
        font-size: 0.72rem;
        font-weight: 900;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      .seal {
        display: inline-grid;
        place-items: center;
        width: 30px;
        height: 20px;
        border: 1px solid rgba(247, 243, 231, 0.32);
        border-radius: 50%;
        color: #ffd66b;
        font-size: 0.65rem;
        letter-spacing: 0;
      }

      .santa .cover {
        background:
          radial-gradient(circle at 18% 18%, rgba(255, 255, 255, 0.9) 0 1px, transparent 2px),
          radial-gradient(circle at 66% 28%, rgba(255, 255, 255, 0.84) 0 2px, transparent 3px),
          linear-gradient(180deg, #263e67 0%, #4e7fa0 58%, #cde8f4 100%);
      }

      .santa .title-strip {
        background:
          linear-gradient(90deg, #d83935 0 8px, transparent 8px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.08), transparent 36%),
          #172433;
      }

      .construction .cover {
        background:
          linear-gradient(180deg, #87ceeb 0 58%, #6aaa45 58%),
          repeating-linear-gradient(90deg, transparent 0 10px, rgba(0, 0, 0, 0.16) 10px 12px);
        image-rendering: pixelated;
      }

      .construction .title-strip {
        color: #0f1114;
        background:
          linear-gradient(90deg, #171717 0 8px, transparent 8px),
          linear-gradient(135deg, #ffd24a 0 25%, #e7a637 25% 50%, #ffd24a 50% 75%, #e7a637 75%);
      }

      .construction .game-meta {
        color: rgba(15, 17, 20, 0.74);
      }

      .construction .seal {
        border-color: rgba(15, 17, 20, 0.34);
        color: #0f1114;
      }

      .mosasaur .cover {
        background:
          radial-gradient(circle at 50% 100%, rgba(18, 147, 126, 0.42), transparent 44%),
          linear-gradient(160deg, #092b3e 0%, #0d5560 45%, #132f44 100%);
      }

      .mosasaur .title-strip {
        background:
          linear-gradient(90deg, #31c6b4 0 8px, transparent 8px),
          linear-gradient(90deg, rgba(255, 209, 102, 0.1), transparent 42%),
          #061825;
      }

      @media (max-width: 960px) {
        .game-grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }

      @media (max-width: 640px) {
        .studio {
          width: min(420px, calc(100% - 24px));
          padding-top: 30px;
        }

        h1 {
          max-width: 8ch;
          font-size: clamp(3.25rem, 17vw, 5.2rem);
        }

        .game-grid {
          grid-template-columns: 1fr;
        }

        .cartridge {
          min-height: 404px;
          padding: 20px 18px 25px;
        }

        .label {
          min-height: 298px;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .cartridge {
          transition: none;
        }

        .cartridge:hover {
          transform: none;
        }
      }
    </style>
  </head>
